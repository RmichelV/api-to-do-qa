<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QA API Tester</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
        .input-group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: bold; }
        input[type="text"], textarea { width: 100%; padding: 0.5rem; }
        textarea { height: 200px; }
        button { padding: 0.75rem 1.5rem; background: #007bff; color: white; border: none; cursor: pointer; font-size: 1rem; }
        button:hover { background: #0056b3; }
        #results { margin-top: 2rem; white-space: pre-wrap; background: #f4f4f4; padding: 1rem; border-radius: 5px; }
        .status-ok { color: green; font-weight: bold; }
        .status-fail { color: red; font-weight: bold; }
        .status-partial { color: orange; font-weight: bold; }
    </style>
</head>
<body>
    <h1>QA API Tester 🤖</h1>
    
    <div class="input-group">
        <label for="url">URL Objetivo:</label>
        <input type="text" id="url" placeholder="https://ejemplo.com">
    </div>

    <div style="margin-bottom: 20px;">
        <button onclick="runTextReading()" style="background:#0d6efd;">▶️ Iniciar revisión (text-reading)</button>
    </div>

    <div id="results">Esperando análisis...</div>

    <script>
        // --- TEXT READING ---
        async function runTextReading() {
            const url = document.getElementById('url').value;
            const resultsDiv = document.getElementById('results');

            if (!url) { alert('Por favor ingresa una URL'); return; }

            resultsDiv.innerHTML = '⏳ Abriendo página y limpiando (mantendré .ddc-wrapper)...';
            try {
                const resp = await fetch('/api/text-reading/preview', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url, headless: false, pauseMs: 15000 })
                });
                const data = await resp.json();
                if (!resp.ok) throw new Error(data.detalles || resp.statusText);

                resultsDiv.innerHTML = `✅ Listo. Wrapper conservado: <b>${data.keptWrapper}</b>`;
            } catch (error) {
                resultsDiv.innerHTML = `<span class="status-fail">Error: ${error.message}</span>`;
            }
        }
    </script>
</body>
</html>
