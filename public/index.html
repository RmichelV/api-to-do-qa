<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QA API Tester</title>
    <style>
        body { font-family: sans-serif; max-width: 1000px; margin: 2rem auto; padding: 0 1rem; }
        .input-group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: bold; }
        .input-group label { display: inline-block; margin-right: 1.5rem; margin-bottom: 0; font-weight: normal; }
        input[type="text"], textarea { width: 100%; padding: 0.5rem; }
        textarea { height: 160px; }
        button { padding: 0.75rem 1.5rem; background: #007bff; color: white; border: none; cursor: pointer; font-size: 1rem; }
        button:hover { background: #0056b3; }
        #outputs { margin-top: 2rem; display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .panel { background: #f4f4f4; padding: 1rem; border-radius: 5px; }
        .panel h3 { margin-top: 0; }
        .text-output { white-space: pre-wrap; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }
        .status-ok { color: green; font-weight: bold; }
        .status-fail { color: red; font-weight: bold; }
        .status-partial { color: orange; font-weight: bold; }
        /* Tabla de anchors */
        .anchors-table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        .anchors-table th, .anchors-table td { border: 1px solid #ddd; padding: 8px; word-break: break-word; overflow-wrap: anywhere; }
        .anchors-table th { background: #e9ecef; text-align: left; }
        .anchors-table th:nth-child(1), .anchors-table td:nth-child(1) { width: 3rem; }
        .anchors-table th:nth-child(4), .anchors-table td:nth-child(4) { width: 6rem; text-align: center; }
        .anchors-url a { color: #0d6efd; text-decoration: none; }
        .anchors-url a:hover { text-decoration: underline; }
        .anchors-url, .anchors-url a { word-break: break-word; overflow-wrap: anywhere; }
        .anchors-panel { overflow-x: auto; }
        #anchors-output { overflow-x: auto; }
        /* Panel H1 */
        .h1-panel .h1-summary { font-weight: bold; }
        .h1-panel .h1-details { margin-top: 0.5rem; }
    </style>
</head>
<body>
    <h1>QA API Tester 🤖</h1>
    
    <div class="input-group">
        <label for="url">URL Objetivo:</label>
        <input type="text" id="url" placeholder="https://ejemplo.com">
    </div>

    <div class="input-group">
        <label for="co">CO: Contenido Original (pegado aquí)</label>
        <textarea id="co" placeholder="Pega aquí tu contenido original..."></textarea>
    </div>

    <div class="input-group">
        <label>
            <input type="checkbox" id="open-browser" /> Abrir navegador (visual) y cerrar tras 10s
        </label>
        <label>
            <input type="checkbox" id="show-content" checked /> Mostrar contenido extraído (CP y CO)
        </label>
    </div>

    <div style="margin-bottom: 20px;">
        <button onclick="runTextReading()" style="background:#0d6efd;">▶️ Iniciar revisión (text-reading)</button>
        <button onclick="runLinkReading()" style="background:#6f42c1; margin-left:8px;">🔗 Leer enlaces (link-reading)</button>
    </div>

    <div id="outputs">
        <div class="panel" id="cp-panel">
            <h3>CP: Contenido de la página (normalizado)</h3>
            <div id="cp-output" class="text-output">Esperando análisis...</div>
        </div>
        <div class="panel" id="co-panel">
            <h3>CO: Contenido original (normalizado)</h3>
            <div id="co-output" class="text-output">Esperando análisis...</div>
        </div>
        <div class="panel" style="grid-column: 1 / span 2;">
            <h3>Comparación línea a línea</h3>
            <div id="compare-summary" class="text-output">Pendiente…</div>
            <div id="compare-details" class="text-output" style="margin-top:0.5rem;"></div>
        </div>
        <div class="panel anchors-panel" style="grid-column: 1 / span 2;">
            <h3>Enlaces (texto y URL)</h3>
            <div id="anchors-output">Aún no extraídos…</div>
        </div>
        <div class="panel h1-panel" style="grid-column: 1 / span 2;">
            <h3>Revisión H1</h3>
            <div id="h1-summary" class="h1-summary">Aún no evaluado…</div>
            <div id="h1-details" class="h1-details"></div>
        </div>
    </div>

    <script>
        // --- TEXT READING ---
        // Eliminado: la normalización y comparación se hará en el backend para evitar divergencias

        // Eliminado: la comparación ahora la hará el backend

        async function runTextReading() {
            const url = document.getElementById('url').value;
            const coInput = document.getElementById('co').value;
            const cpDiv = document.getElementById('cp-output');
            const coDiv = document.getElementById('co-output');
            const compareSummary = document.getElementById('compare-summary');
            const compareDetails = document.getElementById('compare-details');
            const cpPanel = document.getElementById('cp-panel');
            const coPanel = document.getElementById('co-panel');

            if (!url) { alert('Por favor ingresa una URL'); return; }

            // Controlar visibilidad de paneles según checkbox
            const showContent = document.getElementById('show-content').checked;
            cpPanel.style.display = showContent ? '' : 'none';
            coPanel.style.display = showContent ? '' : 'none';

            cpDiv.textContent = '⏳ Abriendo página, limpiando y extrayendo texto...';
            coDiv.textContent = '⏳ Normalizando CO...';
            compareSummary.textContent = '⏳ Comparando líneas...';
            compareDetails.textContent = '';
            try {
                const openBrowser = document.getElementById('open-browser').checked;
                const resp = await fetch('/api/text-reading/compare', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        url,
                        coText: coInput,
                        headless: openBrowser ? false : true,
                        pauseMs: openBrowser ? 10000 : 0
                    })
                });
                const data = await resp.json();
                if (!resp.ok) throw new Error((data && data.error) || resp.statusText);

                // Mostrar CP y CO normalizados del backend
                cpDiv.textContent = (data.cp && data.cp.text) || '';
                coDiv.textContent = (data.co && data.co.text) || '';

                // Resumen y detalle
                const complete = data.result && data.result.complete;
                const ordered = data.result && data.result.ordered;
                const badge = complete && ordered
                  ? '🟢 COMPLETO Y EN ORDEN'
                  : (complete && !ordered ? '🟡 COMPLETO PERO FUERA DE ORDEN' : '🔴 INCOMPLETO');

                const details = (data.details || []);
                const counts = {
                    total: (data.co && data.co.lines ? data.co.lines.length : 0),
                    presentAnywhere: details.filter(d => d.found).length,
                    presentInOrder: details.filter(d => d.orderTag === 'ordered').length,
                    missing: details.filter(d => !d.found).length
                };
                compareSummary.textContent = `${badge} — CO líneas: ${counts.total}, presentes: ${counts.presentAnywhere}, en orden: ${counts.presentInOrder}, faltantes: ${counts.missing}`;

                const lines = details.map((d, i) => {
                    const mark = d.found ? '✔️' : '❌';
                    const where = d.found ? `(CP línea ${(d.cpIndex ?? -1) + 1})` : '(no encontrada)';
                    const orderTag = d.orderTag === 'ordered' ? '↔️ orden ok' : (d.orderTag === 'out-of-order' ? '↯ fuera de orden' : '');
                    return `${mark} [CO ${i + 1}] ${d.line} ${where} ${orderTag}`.trim();
                });
                
                // Mostrar líneas detalladas solo si no está completo o está fuera de orden
                if (complete && ordered) {
                    compareDetails.textContent = '';
                } else {
                    compareDetails.textContent = lines.join('\n');
                }
            } catch (error) {
                cpDiv.textContent = `Error: ${error.message}`;
                const normalizedCO = normalizeText(coInput);
                coDiv.textContent = normalizedCO || '';
                compareSummary.textContent = 'Error durante la comparación';
            }
        }

        // --- LINK READING: Leer enlaces y mostrarlos en tabla ---
        async function runLinkReading() {
            const url = document.getElementById('url').value;
            const openBrowser = document.getElementById('open-browser').checked;
            const anchorsDiv = document.getElementById('anchors-output');
            if (!url) { alert('Por favor ingresa una URL'); return; }
            anchorsDiv.textContent = '⏳ Extrayendo enlaces visibles…';
            try {
                const resp = await fetch('/api/link-reading/anchors', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        url,
                        headless: openBrowser ? false : true,
                        pauseMs: openBrowser ? 10000 : 0
                    })
                });
                const data = await resp.json();
                if (!resp.ok) throw new Error((data && data.error) || resp.statusText);

                const anchors = data.anchors || [];
                if (!anchors.length) {
                    anchorsDiv.textContent = 'No se encontraron enlaces visibles en .ddc-wrapper';
                    return;
                }
                anchorsDiv.innerHTML = buildAnchorsTable(anchors);
                // Después de renderizar, pedir estados HTTP y actualizar la columna
                try {
                    await updateLinkStatuses(anchors.map(a => a.url));
                } catch {}
                // Evaluación H1
                try {
                    await updateH1Check(url, openBrowser);
                } catch {}
            } catch (error) {
                anchorsDiv.textContent = `Error al extraer enlaces: ${error.message}`;
            }
        }

        function buildAnchorsTable(anchors) {
            const rows = anchors.map((a, idx) => {
                const safeText = (a.text || '').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                const safeUrl = (a.url || '').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                return `<tr><td>${idx + 1}</td><td>${safeText}</td><td class="anchors-url"><a href="${safeUrl}" target="_blank" rel="noopener noreferrer">${safeUrl}</a></td><td><span id="link-status-${idx}">…</span></td></tr>`;
            }).join('');
            return `
                <table class="anchors-table">
                    <thead>
                        <tr><th>#</th><th>Texto</th><th>URL</th><th>Estado</th></tr>
                    </thead>
                    <tbody>
                        ${rows}
                    </tbody>
                </table>
            `;
        }

        async function updateLinkStatuses(urls) {
            const resp = await fetch('/api/link-reading/statuses', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ urls, timeoutMs: 8000, concurrency: 6 })
            });
            const data = await resp.json();
            if (!resp.ok) throw new Error((data && data.error) || resp.statusText);
            const statuses = data.statuses || [];
            statuses.forEach((s, idx) => {
                const el = document.getElementById(`link-status-${idx}`);
                if (el) {
                    el.textContent = s.status || 0;
                    el.style.color = s.ok ? 'green' : 'red';
                }
            });
        }

        async function updateH1Check(url, openBrowser) {
            const h1Summary = document.getElementById('h1-summary');
            const h1Details = document.getElementById('h1-details');
            h1Summary.textContent = '⏳ Evaluando H1…';
            h1Details.textContent = '';
            const resp = await fetch('/api/link-reading/h1-check', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ url, headless: openBrowser ? false : true, pauseMs: openBrowser ? 10000 : 0 })
            });
            const data = await resp.json();
            if (!resp.ok) {
                h1Summary.textContent = 'Error al evaluar H1';
                h1Summary.className = 'h1-summary status-fail';
                return;
            }
            const h1Texts = data.h1Texts || [];
            const srOnlyText = data.srOnlyText || null;
            const count = h1Texts.length;

            // Regla 1: más de un h1 (excluyendo sr-only) => rojo
            if (count > 1) {
                h1Summary.textContent = `🔴 Hay ${count} H1 visibles (se espera 1)`;
                h1Summary.className = 'h1-summary status-fail';
                h1Details.innerHTML = h1Texts.map(t => `• ${escapeHtml(t)}`).join('<br>');
                return;
            }

            // Regla 2: exactamente un h1 y uno sr-only iguales => verde
            if (count === 1 && srOnlyText && normalizeStr(h1Texts[0]) === normalizeStr(srOnlyText)) {
                h1Summary.textContent = '🟢 Solo hay un H1 y coincide con el H1 sr-only';
                h1Summary.className = 'h1-summary status-ok';
                h1Details.innerHTML = `H1: ${escapeHtml(h1Texts[0])}<br>sr-only: ${escapeHtml(srOnlyText)}`;
                return;
            }

            // Regla 3: exactamente un h1 y uno sr-only distintos => naranja
            if (count === 1 && srOnlyText && normalizeStr(h1Texts[0]) !== normalizeStr(srOnlyText)) {
                h1Summary.textContent = '🟠 H1 y H1 sr-only son distintos';
                h1Summary.className = 'h1-summary status-partial';
                h1Details.innerHTML = `H1: ${escapeHtml(h1Texts[0])}<br>sr-only: ${escapeHtml(srOnlyText)}`;
                return;
            }

            // Casos adicionales (no especificados): sin H1 visible
            if (count === 0) {
                if (srOnlyText) {
                    h1Summary.textContent = '🟠 No hay H1 visible, solo H1 sr-only presente';
                    h1Summary.className = 'h1-summary status-partial';
                    h1Details.textContent = `sr-only: ${escapeHtml(srOnlyText)}`;
                } else {
                    h1Summary.textContent = '🔴 No se encontró ningún H1';
                    h1Summary.className = 'h1-summary status-fail';
                }
                return;
            }

            // Por defecto: un H1 sin sr-only => verde
            h1Summary.textContent = '🟢 Solo hay un H1 visible';
            h1Summary.className = 'h1-summary status-ok';
            h1Details.textContent = `H1: ${escapeHtml(h1Texts[0])}`;
        }

        function escapeHtml(str) {
            return String(str).replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        function normalizeStr(str) {
            return String(str).trim().replace(/\s+/g, ' ').toLowerCase();
        }
    </script>
</body>
</html>
